<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MyDuit</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <h2><i class="fas fa-chart-line"></i> MyDuit Dashboard</h2>
        <div>
            <button onclick="toggleDarkMode()" id="darkToggle">
                <i class="fas fa-moon"></i> Dark Mode
            </button>
            <button onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Keluar
            </button>
        </div>
    </nav>
    
    <div class="container">
        <!-- Summary Cards -->
        <div class="summary-grid">
            <div class="card income">
                <i class="fas fa-arrow-up"></i>
                <h3>Pemasukan</h3>
                <span id="totalIncome">Rp 0</span>
            </div>
            <div class="card expense">
                <i class="fas fa-arrow-down"></i>
                <h3>Pengeluaran</h3>
                <span id="totalExpense">Rp 0</span>
            </div>
            <div class="card balance">
                <i class="fas fa-wallet"></i>
                <h3>Saldo</h3>
                <span id="balance">Rp 0</span>
            </div>
        </div>

        <!-- Add Transaction Form -->
        <div class="form-section">
            <h3><i class="fas fa-plus"></i> Tambah Transaksi</h3>
            <div class="form-group">
                <input type="number" id="amount" placeholder="Jumlah (Rp)" step="1000" min="0">
                <select id="type">
                    <option value="income">Pemasukan</option>
                    <option value="expense">Pengeluaran</option>
                </select>
                <input type="date" id="date">
                <input type="text" id="desc" placeholder="Deskripsi (wajib)">
                <button id="submitBtn" onclick="addTransaction()">
                    <i class="fas fa-save"></i> Tambah
                </button>
            </div>
        </div>

        <!-- Filter & Export -->
        <div class="filter-section">
            <input type="text" id="search" placeholder="🔍 Cari deskripsi...">
            <input type="date" id="filterDate">
            <select id="filterType">
                <option value="">Semua Jenis</option>
                <option value="income">Pemasukan</option>
                <option value="expense">Pengeluaran</option>
            </select>
            <button onclick="exportCSV()">
                <i class="fas fa-download"></i> Export CSV
            </button>
        </div>

        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-container">
                <h4><i class="fas fa-chart-pie"></i> Ringkasan</h4>
                <canvas id="pieChart"></canvas>
            </div>
            <div class="chart-container">
                <h4><i class="fas fa-chart-line"></i> Tren Bulanan</h4>
                <canvas id="lineChart"></canvas>
            </div>
        </div>

        <!-- Transactions Table -->
        <div class="table-section">
            <h3><i class="fas fa-list"></i> Daftar Transaksi (<span id="transCount">0</span>)</h3>
            <div class="table-wrapper">
                <table id="transTable">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Deskripsi</th>
                            <th>Jumlah</th>
                            <th>Jenis</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/transactions.js"></script>
</body>
</html>
